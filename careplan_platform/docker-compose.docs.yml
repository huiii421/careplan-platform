services:
  docs:
    image: careplan_platform_local_docs
    container_name: careplan_platform_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./careplan_platform:/app/careplan_platform:z
    ports:
      - '9000:9000'
    command: /start-docs
